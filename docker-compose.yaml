services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant_storage:/qdrant/storage
    restart: unless-stopped

  api:
    build: ./services/api
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
    restart: unless-stopped

  ui:
    build: ./services/ui
    environment:
      API_URL: http://api:8000
    volumes:
      - ./data:/data:ro
    ports:
      - "8501:8501"
    depends_on:
      - api
    restart: unless-stopped
