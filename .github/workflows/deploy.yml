name: Deploy to Lightsail

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy to Lightsail
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          timeout: 1800s
          script: |
            set -e
            set +x

            cd ~/shop-talk
            PREV_COMMIT=$(git rev-parse HEAD)

            echo "Pulling latest code..."
            git pull origin main

            echo "Rebuilding and restarting services..."
            docker compose down --remove-orphans
            docker compose up -d --build

            echo "Waiting for API to become healthy (up to 120s)..."
            HEALTHY=0
            for i in $(seq 1 24); do
              if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                echo "API healthy after $((i * 5))s"
                HEALTHY=1
                break
              fi
              sleep 5
            done

            if [ "$HEALTHY" -eq 0 ]; then
              echo "API did not become healthy — rolling back to $PREV_COMMIT..."
              docker compose logs api --tail=40
              git checkout "$PREV_COMMIT"
              docker compose up -d --build
              echo "Rollback complete."
              exit 1
            fi

            echo "Checking Qdrant health..."
            curl -sf http://localhost:6333/healthz \
              && echo "Qdrant healthy" \
              || (echo "Qdrant not healthy" && docker compose logs qdrant --tail=20 && exit 1)

            echo "Deploy complete."
